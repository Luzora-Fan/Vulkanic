name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build (your script)
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\build.ps1 -Clean

      - name: Zip package
        shell: pwsh
        run: |
          Compress-Archive -Path .\package\* -DestinationPath Vulkanic-${{ github.ref_name }}-windows.zip

      - name: Create Release + Upload
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} `
            Vulkanic-${{ github.ref_name }}-windows.zip `
            --generate-notes