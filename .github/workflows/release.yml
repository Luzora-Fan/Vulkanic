name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Vulkan SDK
        shell: pwsh
        run: choco install vulkan-sdk -y

      - name: Set Vulkan env
        shell: pwsh
        run: |
          # Find the actual directory inside C:\VulkanSDK
          $vulkanPath = (Get-ChildItem -Path C:\VulkanSDK -Directory | Select-Object -First 1).FullName
          
          # Persist to GITHUB_ENV so subsequent steps (like CMake) can read it
          echo "VULKAN_SDK=$vulkanPath" >> $env:GITHUB_ENV
          
          echo "Resolved Vulkan SDK Path: $vulkanPath"

      - name: Build
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\build.ps1 -Clean

      - name: Zip package
        shell: pwsh
        run: Compress-Archive -Path .\package\* -DestinationPath Vulkanic-${{ github.ref_name }}-windows.zip

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create ${{ github.ref_name }} Vulkanic-${{ github.ref_name }}-windows.zip --generate-notes